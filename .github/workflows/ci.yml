name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run full test suite (includes rehearsal regression tests)
        run: python -m pytest -q

      - name: Run rehearsal tests explicitly
        run: python -m pytest -m rehearsal -q